name: Weekly Roster Blast

on:
  schedule:
    # 0 = minute 0
    # 15 = 3:00 PM UTC (which is 10:00 AM Central Time)
    # * = every day of the month
    # * = every month
    # 4 = Thursday
    - cron: "0 15 * * 4"
  workflow_dispatch:

jobs:
  post-roster:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fire Weekend Roster Blast
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python active_rosters.py
